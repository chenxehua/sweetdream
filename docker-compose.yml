version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sweetdream-postgres
    environment:
      POSTGRES_DB: sweetdream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 可选：如果只需要数据库，用这个就够了
  # Studio (类似 Supabase Studio) 可以后续添加

volumes:
  postgres_data:
